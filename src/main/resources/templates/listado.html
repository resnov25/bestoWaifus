<!doctype html>
<html lang="en" xmlns:object-fit="http://www.w3.org/1999/xhtml" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link href="../static/css/waifuEstilos" rel="stylesheet">

    <title>Top Waifus</title>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#"><img src="Img/logo.png" alt="" width="30" height="30">
            Top Waifus semanales
        </a>
    </div>
</nav>

<div class="container mt-4 vj-style">
    <div class="row">
        <div th:each="Waifu : ${Waifus}" class="col-md-3 mb-4">
            <div class="card">
                <img th:src="${Waifu.imagenUrl}"
                     class="card-img-top " height="200" object-fit:cover>
                <div class="card-body">
                    <h5 th:text="${Waifu.nombre}" class="card-title"></h5>
                    <span th:text="${Waifu.estudio.nombre}" class="badge bg-warning text-dark"></span>
                    <span th:text="${Waifu.anime.nombre}" class="badge bg-danger"></span>
                    <p th:text="${Waifu.descripcion}" class="card-text"></p>
                    <a href="#" class="btn btn-primary">Conoce mas</a>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Optional JavaScript; choose one of the two! -->

<!-- Option 1: Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>

<!-- Option 2: Separate Popper and Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
-->
</body>
</html>
